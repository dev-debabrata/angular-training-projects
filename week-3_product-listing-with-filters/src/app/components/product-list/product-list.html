<div class="search-input">
  <input type="text" placeholder="Search product..." [(ngModel)]="searchText" />
</div>

<div class="product-list">
  @for (product of filteredProducts; track product.id) {
    <div
      class="card"
      [ngClass]="{ 'low-stock': product.stock > 0 && product.stock < 3 }"
      appHighlight
    >
      <div class="img-container">
        <img [src]="product.image" [alt]="product.name" class="product-img" />
      </div>
      <h3>{{ product.name }}</h3>

      <p>{{ product.description | truncate: 25 }}</p>

      <p><strong>Price:</strong> {{ product.price | currency: 'INR' }}</p>

      <div class="status-section">
        <div class="stock-message">
          @if (product.stock === 0) {
            <span class="out-of-stock">Out of Stock</span>
          } @else if (product.stock < 3) {
            <span class="low-stock-text">⚠️ Only few left</span>
          }
        </div>

        @if (product.stock > 0) {
          <div class="button-group">
            <button class="cart-button">Add to Cart</button>
            <button class="buy-button">Buy Now</button>
          </div>
        }
      </div>
    </div>
  }
</div>
